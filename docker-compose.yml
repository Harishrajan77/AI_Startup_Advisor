version: '3.8'

services:
  # Database Service
  db:
    image: postgres:15-alpine
    container_name: startup_advisor_db
    restart: always
    environment:
      POSTGRES_USER: advisor_user
      POSTGRES_PASSWORD: advisor_secure_password
      POSTGRES_DB: startup_advisor_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Backend FastAPI service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: startup_advisor_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - MODEL_PROVIDER=${MODEL_PROVIDER}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - PROJECT_NAME=${PROJECT_NAME}
      # Point to our postgres container
      - DATABASE_URL=postgresql://advisor_user:advisor_secure_password@db:5432/startup_advisor_db
    depends_on:
      - db
    volumes:
      # Mount directory for development hot-reloads and local database file updates
      - ./backend:/app

  # Frontend Vite service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: startup_advisor_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_APP_NAME=${VITE_APP_NAME}
      - VITE_APP_SUBTITLE=${VITE_APP_SUBTITLE}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      # Avoid overwriting container node_modules
      - /app/node_modules

volumes:
  postgres_data:
